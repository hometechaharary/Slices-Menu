<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slices of Brooklyn - Menu Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    color: #f5f0e8;
    font-family: 'Lato', sans-serif;
  }

  .page {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  #watermark {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60vw; height: 60vw;
    border-radius: 50%;
    object-fit: cover;
    opacity: 0.055;
    filter: grayscale(100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  .header {
    position: relative; z-index: 1;
    flex-shrink: 0;
    background: linear-gradient(180deg, #1a0000 0%, #2d0000 100%);
    border-bottom: 2px solid #c41e3a;
    padding: 0.55vh 2vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { text-align: left; }
  .store-name {
    font-family: 'Oswald', sans-serif;
    font-size: 3.4vh;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: #fff;
    text-shadow: 0 0 2vw rgba(196,30,58,0.7);
    text-transform: uppercase;
    line-height: 1.05;
  }
  .store-tagline {
    font-size: 1.1vh;
    color: #c41e3a;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 700;
    margin-top: 0.15vh;
  }
  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.3vh;
  }
  .header-clock {
    font-family: 'Oswald', sans-serif;
    font-size: 3vh;
    font-weight: 700;
    color: #f5d66b;
    letter-spacing: 0.08em;
    line-height: 1;
  }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 0.4vw;
    background: rgba(196,30,58,0.15);
    border: 1px solid rgba(196,30,58,0.4);
    border-radius: 0.4vh;
    padding: 0.15vh 0.6vw;
  }
  .live-dot {
    width: 0.7vh; height: 0.7vh;
    border-radius: 50%;
    background: #888;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }
  .live-text {
    font-family: 'Oswald', sans-serif;
    font-size: 0.95vh;
    font-weight: 600;
    color: #c41e3a;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── BOARD ── */
  .board {
    position: relative; z-index: 1;
    flex: 1 1 0;
    min-height: 0;
    padding: 1vh 1.5vw;
    display: grid;
    grid-template-columns: repeat(var(--cols, 3), 1fr);
    grid-auto-rows: min-content;
    gap: 1vh 1.2vw;
    align-content: start;
    overflow: hidden;
  }

  .cat-block.wide { grid-column: 1 / -1; }

  .cat-block {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 0.6vh;
    overflow: hidden;
  }
  .cat-header {
    background: linear-gradient(90deg, #1e0a00, #3a1500);
    border-bottom: 1px solid #c41e3a;
    padding: 0.5vh 1vw;
    display: flex;
    align-items: center;
    gap: 0.5vw;
  }
  .cat-icon { font-size: 2.5vh; }
  .cat-name {
    font-family: 'Oswald', sans-serif;
    font-size: 2.5vh;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #f5d66b;
  }

  /* Non-pizza: single column */
  .item-grid { display: grid; grid-template-columns: 1fr; }
  /* Pizza wide block: 3-column, left-to-right flow */
  .wide .item-grid { grid-template-columns: 1fr 1fr 1fr; }

  .menu-item {
    padding: 0.55vh 1vw;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.6vw;
  }
  .menu-item:last-child { border-bottom: none; }

  .item-left { flex: 1; min-width: 0; }

  .item-name-row {
    display: flex;
    align-items: center;
    gap: 0.5vw;
    min-width: 0;
  }
  .item-name {
    font-family: 'Oswald', sans-serif;
    font-size: 2.5vh;
    font-weight: 600;
    color: #fff;
    line-height: 1.15;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 1;
    min-width: 0;
  }
  .item-badge {
    flex-shrink: 0;
    display: inline-block;
    padding: 0.05vh 0.4vw;
    border-radius: 0.2vh;
    font-size: 1.30vh;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1.7;
    white-space: nowrap;
  }
  .badge-POPULAR  { background: #c41e3a; color: #fff; }
  .badge-NEW      { background: #2e7d32; color: #fff; }
  .badge-SEASONAL { background: #e65100; color: #fff; }
  .badge-SOLDOUT  { background: #444;    color: #999; }
  .badge-FEATURED { background: #f5d66b; color: #000; }

  .item-desc {
    font-size: 1.90vh;
    color: #999;
    margin-top: 0.1vh;
    line-height: 1.5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── PRICING ── */
  .item-price { text-align: right; flex-shrink: 0; }

  /* Single price (items with only one price point) */
  .price-single {
    font-family: 'Oswald', sans-serif;
    font-size: 2.0vh;
    font-weight: 700;
    color: #f5d66b;
  }

  /* Multi-price group (Slice+Pie for pizza, Sm+Md+Lg for others) */
  .price-group {
    display: flex;
    gap: 0.8vw;
    align-items: flex-start;
  }
  .price-col { text-align: center; }
  .price-amount {
    font-family: 'Oswald', sans-serif;
    font-size: 2.0vh;
    font-weight: 600;
    color: #f5d66b;
    display: block;
    line-height: 1.15;
  }
  .price-label {
    font-size: 1.8vh;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: block;
    margin-top: 0.1vh;
  }

  /* Pizza-specific: divider between Slice and Pie */
  .price-divider {
    width: 1px;
    background: rgba(255,255,255,0.15);
    align-self: stretch;
    margin: 0.1vh 0;
  }

  .sold-out-text { font-size: 0.85vh; color: #666; font-style: italic; }

  /* ── FOOTER ── */
  .footer {
    position: relative; z-index: 1;
    flex-shrink: 0;
    border-top: 1px solid #c41e3a;
    background: #0d0d0d;
    padding: 0.4vh 2vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-motto { font-size: 0.9vh; color: #666; font-style: italic; }
  .footer-note  { font-size: 0.7vh; color: #444; }
  /* ── STATUS BAR (debug / connection feedback) ── */
  .status-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 999;
    padding: 0.4vh 2vw;
    font-family: 'Oswald', sans-serif;
    font-size: 0.85vh;
    letter-spacing: 0.05em;
    display: none;
    align-items: center;
    gap: 1vw;
    background: rgba(0,0,0,0.92);
    border-top: 1px solid #333;
    color: #aaa;
  }
  .status-bar.visible { display: flex; }
  .status-bar .status-label { color: #f5d66b; font-weight: 700; }
  .status-bar .status-msg   { flex: 1; }
  .status-bar .status-close { cursor: pointer; color: #666; }
  .status-bar .status-close:hover { color: #fff; }
</style>
</head>

var VALID_BADGES = { POPULAR:1, NEW:1, SEASONAL:1, FEATURED:1 };

/* =============================================================
   STATUS BAR — shows connection errors visibly on screen
   ============================================================= */
function showStatus(msg, isError) {
  var bar = document.getElementById('status-bar');
  var msgEl = document.getElementById('status-msg');
  if (!bar || !msgEl) return;
  msgEl.textContent = msg;
  bar.style.borderTopColor = isError ? '#c41e3a' : '#2e7d32';
  bar.classList.add('visible');
  // auto-hide after 8s if not an error
  if (!isError) setTimeout(function(){ bar.classList.remove('visible'); }, 8000);
}
function hideStatus() {
  var bar = document.getElementById('status-bar');
  if (bar) bar.classList.remove('visible');
}

/* =============================================================
   URL VALIDATOR — catches common Google Sheets URL mistakes
   ============================================================= */
function validateAndFixUrl(url) {
  url = url.trim();
  if (!url) return null;

  // Already a correct publish URL
  if (url.indexOf('/pub?') >= 0 || url.indexOf('output=csv') >= 0) {
    // Make sure output=csv is present
    if (url.indexOf('output=csv') < 0) url += '&output=csv';
    return url;
  }

  // Regular share URL: https://docs.google.com/spreadsheets/d/SHEET_ID/edit...
  // Convert to publish URL
  var match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (match) {
    var sheetId = match[1];
    // Try to extract gid (sheet tab) if present
    var gidMatch = url.match(/[?&]gid=([0-9]+)/);
    var gid = gidMatch ? gidMatch[1] : '0';
    var fixed = 'https://docs.google.com/spreadsheets/d/' + sheetId
      + '/pub?gid=' + gid + '&single=true&output=csv';
    showStatus('URL auto-corrected to CSV export format. If still failing, use File \u2192 Share \u2192 Publish to web in Google Sheets.', false);
    return fixed;
  }

  return url; // return as-is and let fetch fail naturally
}

/* =============================================================
   CSV PARSER
   ============================================================= */
function normKey(s) { return s.toLowerCase().replace(/[^a-z0-9]/g, ''); }

var HEADER_MAP = {
  category:'category', cat:'category',
  name:'name', itemname:'name', item:'name',
  description:'description', desc:'description',
  priceslice:'price_slice', slice:'price_slice', byslice:'price_slice',
  pricepie:'price_pie', pie:'price_pie', wholepie:'price_pie', fullpie:'price_pie',
  pricesmall:'price_small',  small:'price_small',  sm:'price_small',
  pricemedium:'price_medium',medium:'price_medium', med:'price_medium', md:'price_medium',
  pricelarge:'price_large',  large:'price_large',  lg:'price_large',
  available:'available', active:'available', show:'available', enabled:'available',
  badge:'badge', tag:'badge', label:'badge', highlight:'badge'
};

function parseCSV(text) {
  text = text.replace(/^\uFEFF/, '');

  // Handle both \r\n and \n line endings
  var lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];

  // Parse header — handle quoted fields
  var rawHeaders = splitCSVLine(lines[0]);
  var headers = rawHeaders.map(function(h){ return HEADER_MAP[normKey(h)] || normKey(h); });

  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var cols = splitCSVLine(lines[i]);
    var row  = {};
    headers.forEach(function(h, idx){ row[h] = cols[idx] !== undefined ? cols[idx].trim() : ''; });
    if (!row.name || !row.name.trim()) continue;
    var avail = (row.available || '').toUpperCase();
    if (avail && ['FALSE','0','NO','N','OFF'].indexOf(avail) >= 0) continue;
    rows.push(row);
  }
  return rows;
}

// Proper CSV line splitter — handles quoted fields with commas inside
function splitCSVLine(line) {
  var result = [], current = '', inQuotes = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(current); current = '';
    } else {
      current += ch;
    }
  }
  result.push(current);
  return result;
}

/* =============================================================
   PRICE FORMATTER
   ============================================================= */
function fmtPrice(v) {
  if (v === null || v === undefined || v === '') return null;
  var n = parseFloat(String(v).replace(/[^0-9.]/g, ''));
  return isNaN(n) ? null : '$' + n.toFixed(2);
}

/* =============================================================
   RENDER ITEM
   ============================================================= */
function renderItem(item, isPizzaCat) {
  var badgeRaw   = (typeof item.badge === 'string') ? item.badge.trim() : '';
  var badgeUpper = badgeRaw.toUpperCase();
  var isSoldOut  = badgeUpper === 'SOLDOUT';
  var badgeHTML  = VALID_BADGES[badgeUpper]
    ? '<span class="item-badge badge-' + badgeUpper + '">' + badgeRaw + '</span>'
    : '';

  var priceHTML = '';

  if (isSoldOut) {
    priceHTML = '<div class="sold-out-text">Sold Out</div>';

  } else if (isPizzaCat) {
    var slicePrice = fmtPrice(item.price_slice) || fmtPrice(item.price_small);
    var piePrice   = fmtPrice(item.price_pie)   || fmtPrice(item.price_large);
    var cols = '';
    if (slicePrice) cols += '<div class="price-col"><span class="price-amount">' + slicePrice + '</span><span class="price-label">Slice</span></div>';
    if (slicePrice && piePrice) cols += '<div class="price-divider"></div>';
    if (piePrice)   cols += '<div class="price-col"><span class="price-amount">' + piePrice   + '</span><span class="price-label">Pie</span></div>';
    priceHTML = cols ? '<div class="price-group">' + cols + '</div>' : '';

  } else {
    var sm = fmtPrice(item.price_small);
    var md = fmtPrice(item.price_medium);
    var lg = fmtPrice(item.price_large);
    if (sm && !md && !lg) {
      priceHTML = '<div class="price-single">' + sm + '</div>';
    } else {
      var cols = '';
      if (sm) cols += '<div class="price-col"><span class="price-amount">' + sm + '</span><span class="price-label">Sm</span></div>';
      if (md) cols += '<div class="price-col"><span class="price-amount">' + md + '</span><span class="price-label">Md</span></div>';
      if (lg) cols += '<div class="price-col"><span class="price-amount">' + lg + '</span><span class="price-label">Lg</span></div>';
      priceHTML = cols ? '<div class="price-group">' + cols + '</div>' : '';
    }
  }

  return '<div class="menu-item">'
    + '<div class="item-left">'
    +   '<div class="item-name-row">'
    +     '<span class="item-name">' + item.name + '</span>'
    +     badgeHTML
    +   '</div>'
    +   (item.description ? '<div class="item-desc">' + item.description + '</div>' : '')
    + '</div>'
    + '<div class="item-price">' + priceHTML + '</div>'
    + '</div>';
}

/* =============================================================
   RENDER BOARD
   ============================================================= */
function renderBoard(items) {
  document.getElementById('board').style.setProperty('--cols', CONFIG.GRID_COLUMNS);
  var grouped = {}, order = [];
  items.forEach(function(item) {
    var cat = (item.category || 'Other').trim();
    if (!grouped[cat]) { grouped[cat] = []; order.push(cat); }
    grouped[cat].push(item);
  });
  var html = '';
  order.forEach(function(cat) {
    var icon       = CONFIG.CATEGORY_ICONS[cat] || '\uD83C\uDF7D\uFE0F';
    var isWide     = CONFIG.WIDE_CATEGORIES.indexOf(cat) >= 0;
    var isPizzaCat = CONFIG.PIZZA_CATEGORIES.indexOf(cat) >= 0;
    var isPastaCat = CONFIG.PASTA_CATEGORIES.indexOf(cat) >= 0;
    var itemsHTML  = grouped[cat].map(function(item){ return renderItem(item, isPizzaCat); }).join('');
    html += '<div class="cat-block' + (isWide ? ' wide' : '') + '">'
      + '<div class="cat-header"><span class="cat-icon">' + icon + '</span><span class="cat-name">' + cat + '</span></div>'
      + '<div class="item-grid">' + itemsHTML + '</div>'
      + '</div>';
  });
  document.getElementById('board').innerHTML = html;
}

/* =============================================================
   LOAD MENU  — with URL validation, CORS handling, clear errors
   ============================================================= */
var _retryCount = 0;
var _maxRetry   = 3;

function loadMenu() {
  if (!CONFIG.SHEET_CSV_URL || !CONFIG.SHEET_CSV_URL.trim()) {
    updateLiveBadge(false);
    renderBoard(DEMO_DATA);
    return;
  }

  var url = validateAndFixUrl(CONFIG.SHEET_CSV_URL);
  if (!url) {
    showStatus('ERROR: SHEET_CSV_URL is set but appears invalid. Check the URL in CONFIG.', true);
    updateLiveBadge(false);
    renderBoard(DEMO_DATA);
    return;
  }

  // Bust cache
  var fetchUrl = url + (url.indexOf('?') >= 0 ? '&' : '?') + '_t=' + Date.now();

  fetch(fetchUrl, { method: 'GET', mode: 'cors', cache: 'no-store' })
    .then(function(res) {
      if (!res.ok) throw new Error('Server returned HTTP ' + res.status
        + '. Make sure the sheet is published publicly (File \u2192 Share \u2192 Publish to web).');
      return res.text();
    })
    .then(function(text) {
      // Sanity check — should look like CSV not HTML
      if (text.trim().charAt(0) === '<') {
        throw new Error('Got an HTML page instead of CSV. '
          + 'Make sure you published as CSV format, not as a web page.');
      }
      var items = parseCSV(text);
      if (!items.length) {
        throw new Error('CSV loaded but no menu items found. '
          + 'Check that your sheet has a header row and data rows with a "name" column.');
      }
      _retryCount = 0;
      hideStatus();
      updateLiveBadge(true);
      renderBoard(items);
    })
    .catch(function(err) {
      _retryCount++;
      var msg = 'SHEET CONNECTION ERROR: ' + err.message;
      if (_retryCount <= _maxRetry) {
        msg += ' (retry ' + _retryCount + '/' + _maxRetry + ' in 15s)';
        setTimeout(loadMenu, 15000);
      } else {
        msg += ' — Showing demo data. Fix the URL then refresh.';
      }
      console.error(msg);
      showStatus(msg, true);
      updateLiveBadge(false);
      renderBoard(DEMO_DATA);
    });
}

loadMenu();
setInterval(loadMenu, CONFIG.REFRESH_SECONDS * 120);
</script>

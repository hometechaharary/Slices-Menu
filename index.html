<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Slices Menu Board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap');

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Oswald
</head>
<body>

<div class="menu">

  <!-- LEFT COLUMN -->
  <div class="panel">
    <h2>PIZZA BY THE SLICE</h2>

    <!-- EDIT ITEMS HERE -->
    <div class="item"><span>Cheese Slice</span><span class="price">$3.50</span></div>
    <div class="item"><span>Pepperoni Slice</span><span class="price">$4.25</span></div>
    <div class="item"><span>Vodka Slice</span><span class="price">$5.00</span></div>
    <div class="item"><span>Buffalo Chicken Slice</span><span class="price">$5.25</span></div>

    <h2 style="margin-top:40px;">SQUARE SLICES</h2>
    <div class="item"><span>Sicilian Slice</span><span class="price">$4.75</span></div>
    <div class="item"><span>Grandma Slice</span><span class="price">$5.00</span></div>

  </div>

  <!-- CENTER COLUMN -->
  <div class="panel center">
    <img class="logo" src="IMG-20260524-WA0014.jpg" alt="Slices Brooklyn Logo">
    <div class="tagline">BROOKLYN STYLE • FRESH DAILY • HOT & READY</div>

    <div style="margin-top:40px;text-align:center;font-size:24px;color:#ffcc00;">
      LIVE MENU POWERED BY GOOGLE SHEETS
    </div>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="panel">
    <h2>APPETIZERS</h2>

    <div class="item"><span>Garlic Knots</span><span class="price">$4.50</span></div>
    <div class="item"><span>Mozzarella Sticks</span><span class="price">$6.50</span></div>
    <div class="item"><span>Chicken Tenders</span><span class="price">$7.50</span></div>

    <h2 style="margin-top:40px;">DRINKS</h2>
    <div class="item"><span>Soda</span><span class="price">$2.75</span></div>
    <div class="item"><span>Water</span><span class="price">$1.75</span></div>
  </div>

</div>

<div class="note">
  EDIT PRICES DIRECTLY IN HTML • OPTIMIZED FOR 4K TV DISPLAY (3840x2160)
</div>

<!-- GOOGLE SHEETS INTEGRATION -->
<script>
/*
====================================================
HOW TO CONNECT GOOGLE SHEETS
====================================================

1. Create a Google Sheet
2. Add columns:
   CATEGORY | ITEM | PRICE

Example:
PIZZA BY THE SLICE | Cheese Slice | 3.50

3. Publish sheet to web:
   File > Share > Publish to Web

4. Use SheetDB or Opensheet API

5. Replace YOUR_GOOGLE_SHEET_API_URL below
====================================================
*/

const SHEET_API = 'YOUR_GOOGLE_SHEET_API_URL';

async function loadMenu() {
  if(SHEET_API === 'YOUR_GOOGLE_SHEET_API_URL') return;

  try {
    const response = await fetch(SHEET_API);
    const data = await response.json();

    console.log('Menu Loaded:', data);

    // Here you can dynamically rebuild menu sections
    // from spreadsheet rows.

  } catch (error) {
    console.error('Spreadsheet connection error:', error);
  }
}

loadMenu();

// Auto refresh every 60 seconds
setInterval(loadMenu, 60000);
</script>

</body>
</html>

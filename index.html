<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Slices of Brooklyn Menu</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  overflow: hidden;
}

/* Background logo */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  width: 70%;
  height: 70%;
  transform: translate(-50%, -50%);
  background: url("logo.jpg") no-repeat center;
  background-size: contain;
  opacity: 0.08;
  z-index: 0;
}

.header {
  text-align: center;
  font-size: 60px;
  padding: 30px;
  letter-spacing: 4px;
  position: relative;
  z-index: 2;
}

.menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding: 40px;
  position: relative;
  z-index: 2;
}

.item {
  border-bottom: 1px solid rgba(255,255,255,0.2);
  padding-bottom: 15px;
}

.name {
  font-size: 34px;
  font-weight: bold;
}

.desc {
  font-size: 18px;
  opacity: 0.7;
}

.price {
  float: right;
  font-size: 30px;
  color: gold;
}
</style>
</head>

<body>

<div class="header">SLICES OF BROOKLYN</div>

<div class="menu" id="menu"></div>

<script>
const API_URL = "YOUR_GOOGLE_SCRIPT_URL";

async function loadMenu() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  data.forEach(item => {
    menu.innerHTML += `
      <div class="item">
        <div class="name">
          ${item.name}
          <span class="price">$${item.price}</span>
        </div>
        <div class="desc">${item.description || ""}</div>
      </div>
    `;
  });
}

loadMenu();
setInterval(loadMenu, 60000); // refresh every 60 sec
</script>

</body>
</html>
